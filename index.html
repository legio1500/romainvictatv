<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roma Invicta TV</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">

    <!-- Fonte Cinzel (ADICIONADO) -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: url("background.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-family: 'Cinzel', serif;
            position: relative;
        }

        /* Camada escura */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 1;
        }

        /* Container principal */
        #player-container {
            padding: 20px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 25px;
            position: relative;
            z-index: 2;
            opacity: 1;
            transition: opacity 1s ease;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #player-container.oculto {
            opacity: 0.15;
        }

        /* Título (ADICIONADO) */
        #titulo {
            text-align: center;
            color: #f0e6d3;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            border-bottom: 2px solid rgba(255, 215, 0, 0.3);
            padding-bottom: 10px;
        }

        #titulo span {
            color: #ffd700;
        }

        /* Player */
        #player {
            width: 700px;
            height: 394px;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.15);
        }

        /* Indicador de status (ADICIONADO) */
        #status {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            margin-top: 12px;
            letter-spacing: 2px;
            font-weight: 400;
        }

        #status span {
            color: #ffd700;
            font-weight: 700;
        }

        /* Responsividade (ADICIONADO) */
        @media (max-width: 768px) {
            #player {
                width: 90vw;
                height: calc(90vw * 0.5625);
                /* proporção 16:9 */
            }

            #titulo {
                font-size: 1.2rem;
                letter-spacing: 2px;
            }

            #player-container {
                padding: 12px;
                width: 95vw;
            }
        }

        @media (max-width: 480px) {
            #titulo {
                font-size: 1rem;
                letter-spacing: 1px;
            }

            #status {
                font-size: 0.7rem;
            }
        }
    </style>
</head>

<body>

    <div id="player-container">
        <!-- TÍTULO ADICIONADO -->
        <div id="titulo">Roma <span>Invicta</span> TV</div>

        <div id="player"></div>

        <!-- STATUS ADICIONADO -->
        <div id="status">▶ <span>●</span> AO VIVO</div>
    </div>

    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        const videos = [
            "ODxpHPiF2IU",
            "1kfxiX5aIZc",
            "3z_QAPB3XeA"
        ];

        let indice = 0;
        let player;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                width: '560',
                height: '315',
                videoId: videos[indice],
                playerVars: {
                    autoplay: 1, // ✅ Autoplay ativado
                    controls: 1, // ✅ Mostra controles
                    rel: 0, // ✅ Não mostra vídeos relacionados
                    mute: 1, // 🔇 🔥 ESSE É O SEGREDO!
                    modestbranding: 1, // Marca d'água pequena
                    iv_load_policy: 3, // Sem anotações
                    cc_load_policy: 0, // Sem legendas automáticas
                    fs: 1, // Tela cheia permitida
                    playsinline: 1 // Melhor pra mobile
                },
                events: {
                    'onStateChange': onPlayerStateChange,
                    'onError': onPlayerError // Tratamento de erro (ADICIONADO)
                }
            });
        }

        function onPlayerStateChange(event) {
            // Quando o vídeo termina
            if (event.data === YT.PlayerState.ENDED) {
                indice++;
                if (indice >= videos.length) {
                    indice = 0;
                }
                player.loadVideoById(videos[indice]);
            }

            // Quando o vídeo começa a tocar (ADICIONADO)
            if (event.data === YT.PlayerState.PLAYING) {
                document.getElementById('status').innerHTML = '▶ <span>●</span> REPRODUZINDO';
            }

            // Quando pausado (ADICIONADO)
            if (event.data === YT.PlayerState.PAUSED) {
                document.getElementById('status').innerHTML = '⏸ <span>●</span> PAUSADO';
            }
        }

        // Tratamento de erro (ADICIONADO)
        function onPlayerError(event) {
            console.log('Erro no player:', event.data);
            document.getElementById('status').innerHTML = '⚠️ <span>●</span> ERRO - Próximo vídeo...';

            // Tenta carregar o próximo vídeo em caso de erro
            setTimeout(() => {
                indice++;
                if (indice >= videos.length) {
                    indice = 0;
                }
                player.loadVideoById(videos[indice]);
            }, 3000);
        }

        // ====== EFEITO DE OCULTAR ======
        let temporizadorMouse;
        const container = document.getElementById("player-container");

        container.addEventListener("mouseenter", () => {
            container.classList.remove("oculto");
            clearTimeout(temporizadorMouse);
        });

        container.addEventListener("mouseleave", () => {
            clearTimeout(temporizadorMouse);
            temporizadorMouse = setTimeout(() => {
                container.classList.add("oculto");
            }, 2000);
        });

        // ====== GARANTIR AUTOPLAY (fallback) ======
        // Se o vídeo não tocar automaticamente, tenta de novo
        setTimeout(() => {
            if (player && player.getPlayerState && player.getPlayerState() === -1) {
                player.playVideo();
            }
        }, 3000);
    </script>

</body>

</html>
