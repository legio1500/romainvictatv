<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Roma Invicta TV</title>

<!-- Favicon -->
<link rel="icon" type="image/png" href="favicon.png">

<style>


body {

    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;

    background-image: url("background.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
	font-family: 'Cinzel', serif;
	 position: relative;
	 
}


/* Camada escura */
body::before {
    content: "";
    position: fixed;
    inset: 0;

    background: rgba(0,0,0,0.45);

    z-index: 1;
}

/* Conteúdo acima da camada escura */
#player {
    width: 700px;
    height: 394px;

    position: relative;
    z-index: 2;
    border-radius: 18px;
    overflow: hidden;

    box-shadow:
        0 0 20px rgba(255,255,255,0.25),
        0 0 40px rgba(0,0,0,0.6);
}

#player-container {
    padding: 15px;

    background: rgba(255,255,255,0.08);

    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);

    border-radius: 25px;

    position: relative;
    z-index: 2;

    opacity: 1;
    transition: opacity 1s ease;
}

#player-container.oculto {
    opacity: 0.25;
}



</style>
</head>

<body>


<div id="player-container">
<div id="player"></div>
</div>

<script src="https://www.youtube.com/iframe_api">

</script>



<script>

const videos = [
    "ODxpHPiF2IU",
    "1kfxiX5aIZc",
    "3z_QAPB3XeA"
];

let indice = 0;
let player;

function onYouTubeIframeAPIReady() {

    player = new YT.Player('player', {
        width: '560',
        height: '315',

        videoId: videos[indice],

        playerVars: {
            autoplay: 1,
            controls: 1,
            rel: 0
        },

        events: {
            'onStateChange': onPlayerStateChange
        }
    });
}

function onPlayerStateChange(event) {

    if (event.data === YT.PlayerState.ENDED) {

        indice++;

        if (indice >= videos.length) {
            indice = 0;
        }

        player.loadVideoById(videos[indice]);
    }
}

</script>

<script>

let temporizadorMouse;

const container = document.getElementById("player-container");

container.addEventListener("mouseenter", () => {

    container.classList.remove("oculto");

    clearTimeout(temporizadorMouse);

});

container.addEventListener("mouseleave", () => {

    clearTimeout(temporizadorMouse);

    temporizadorMouse = setTimeout(() => {

        container.classList.add("oculto");

    }, 2000);

});

</script>

</body>
</html>
